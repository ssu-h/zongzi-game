<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>端午全能挑戰賽</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="screen-home">
            <h1>端午全能挑戰賽</h1>
            <p>1️⃣ 龍舟接粽 (40秒)<br>2️⃣ 粽子估價王<br>3️⃣ 端午趣味答題 (50秒)</p>
            <input type="text" id="username" placeholder="請輸入挑戰者姓名">
            <button onclick="Game.init()">開始挑戰</button>
        </div>
        <div id="screen-game" class="hidden">
            <div id="ui-bar">
                玩家: <span id="p-name"></span> | 分數: <span id="p-score">0</span> | 時間: <span id="p-time">0</span>s
            </div>
            <div id="game-area"></div>
        </div>
    </div>
    <script src="config.js"></script>
</body>
</html>
