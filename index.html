<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>端午大俠爭霸戰</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game-wrapper">
    <div id="start-screen" class="stage-screen">
      <h1>🛶 端午大俠爭霸戰</h1>
      <input type="text" id="player-name" placeholder="請輸入大俠姓名">
      <button class="start-btn" onclick="startGame()">開始挑戰</button>
    </div>

    <div id="game-stage1" class="stage-screen hide">
      <div class="status-bar"><span id="timer1">⏱️ 40s</span><span id="score1">得分: 0</span></div>
      <canvas id="gameCanvas" width="300" height="300"></canvas>
    </div>

    <div id="game-stage2" class="stage-screen hide">
      <h2 id="stage2-title">第 1 / 5 題</h2>
      <h3 id="stage2-name">載入中...</h3>
      <div class="image-frame"><img id="stage2-img" src="" alt="粽子"></div>
      <div id="stage2-options"></div>
    </div>

    <div id="game-stage3" class="stage-screen hide">
      <h2 id="stage3-title">第 1 / 10 題</h2>
      <h3 id="stage3-question">載入中...</h3>
      <div id="stage3-options"></div>
    </div>

    <div id="result-screen" class="stage-screen hide">
      <h1>挑戰完成！</h1>
      <p id="res-final-total"></p>
      <button class="start-btn" onclick="location.reload()">重新開始</button>
    </div>
  </div>
  <script src="config.js"></script>
</body>
</html>
